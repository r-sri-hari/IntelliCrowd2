<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliCrowd Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="background-shapes">
        <span class="shape shape1"></span>
        <span class="shape shape2"></span>
        <span class="shape shape3"></span>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-section">
                <h1>IntelliCrowd</h1>
                <p>AI-Based Crowd Monitoring System</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="role">Select Role</label>
                    <select id="role" onchange="handleRoleChange()">
                        <option value="">Choose Role</option>
                        <option value="admin">Admin</option>
                        <option value="client">Client</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="username">Username / Email / Mobile</label>
                    <input type="text" id="username" placeholder="Enter your username or email">
                </div>

                <div class="input-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Enter password">
                        <button type="button" class="toggle-btn" onclick="togglePassword()">👁</button>
                    </div>
                </div>

                <div class="helper-text" id="clientHint">
                    For first-time client login, enter your email/mobile and continue.
                </div>

                <button type="submit" class="login-btn">Login</button>

                <p id="message" class="message-box"></p>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
